[book]
authors = ["Thomas Lackemann"]
language = "en"
multilingual = false
src = "src"
title = "nullfish.dev"
description = "Software Engineer, Entrepreneur, & More"

[preprocessor]

[preprocessor.catppuccin]
assets_version = "2.1.0" # DO NOT EDIT: Managed by `mdbook-catppuccin install`

[output]

[output.html]
additional-css = ["./theme/catppuccin.css", "./theme/catppuccin-admonish.css", "./css/custom.css"]
default-theme = "ayu"
preferred-dark-theme = "ayu"
git-repository-url = "https://www.github.com/tlackemann/nullfish.dev"
git-repository-icon = "fa-github"
no-section-label = true
site-url = "https://nullfish.dev"

[output.html.print]
enable = false

[output.html.fold]
enable = true
level = 1

[preprocessor.last-changed]
command = "mdbook-last-changed"
renderer = ["html"]